<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #fff; padding: 32px 24px; text-align: center;
    }
    .icon { font-size: 72px; margin-bottom: 24px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    p { font-size: 16px; color: rgba(255,255,255,0.55); line-height: 1.5;
        max-width: 280px; margin-bottom: 36px; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: #fff; color: #000; font-size: 16px; font-weight: 600;
      padding: 16px 32px; border-radius: 100px; text-decoration: none;
      transition: opacity 0.15s; margin-bottom: 16px;
    }
    .btn:active { opacity: 0.75; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .status { font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 32px; }
  </style>
</head>
<body>
  <div class="icon">🎁</div>
  <h1 id="title">Opening Wishlist…</h1>
  <p id="subtitle">Tap the button below to open in the Wishlist app.</p>
  <a id="openBtn" class="btn" href="#">Open in Wishlist</a>
  <br>
  <a id="storeBtn" class="btn btn-secondary" href="#" style="display:none">Download Wishlist</a>
  <p class="status" id="status"></p>

  <script>
    const path = window.location.pathname;
    const parts = path.split('/').filter(Boolean);
    const appStoreURL = 'https://apps.apple.com/app/id0000000000';

    let deepLink = 'wishlist://';
    let title = 'Open in Wishlist';
    let subtitle = 'Tap below to open the Wishlist app.';

    for (let i = 0; i < parts.length - 1; i++) {
      if (parts[i] === 'user' && parts[i+1]) {
        const username = parts[i+1];
        deepLink = 'wishlist://user/' + username;
        title = '@' + username + ' on Wishlist';
        subtitle = 'Tap below to view @' + username + "'s profile in the Wishlist app.";
        break;
      }
      if (parts[i] === 'folder' && parts[i+1]) {
        const folderID = parts[i+1];
        deepLink = 'wishlist://folder/' + folderID;
        title = 'Wishlist';
        subtitle = 'Tap below to open this list in the Wishlist app.';
        break;
      }
    }

    document.getElementById('title').textContent = title;
    document.getElementById('subtitle').textContent = subtitle;

    const openBtn = document.getElementById('openBtn');
    const storeBtn = document.getElementById('storeBtn');
    const status = document.getElementById('status');

    openBtn.href = deepLink;
    openBtn.addEventListener('click', function(e) {
      e.preventDefault();
      status.textContent = 'Opening Wishlist…';
      window.location.href = deepLink;
      setTimeout(function() {
        status.textContent = "Couldn't open the app. Don't have Wishlist yet?";
        storeBtn.style.display = 'inline-flex';
        storeBtn.href = appStoreURL;
      }, 2000);
    });
  </script>
</body>
</html>
